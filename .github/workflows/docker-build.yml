name: Docker – Build & Push to GHCR

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  # Rebuild on any source change reaching main/master/develop
  push:
    branches: [main, master, develop]
    paths:
      - "src/**"
      - "frontend/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "distribution/docker/**"
    tags:
      - "v*.*.*"

  # Manual run with optional version override
  workflow_dispatch:
    inputs:
      version:
        description: "Version label baked into the image (default: branch-sha)"
        required: false
        default: ""

# ──────────────────────────────────────────────────────────────────────────────
# Permissions
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build one image per platform, push by digest
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push (${{ matrix.platform }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive VERSION label
        id: version
        run: |
          V="${{ github.event.inputs.version }}"
          if [[ -z "${V}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              V="${GITHUB_REF_NAME#v}"          # strip leading "v"
            else
              V="${GITHUB_REF_NAME}-$(git rev-parse --short HEAD)"
            fi
          fi
          echo "value=${V}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitise platform slug for cache key
        id: slug
        run: echo "value=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push (single platform, by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distribution/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push by digest only – manifest list is assembled in the next job
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha,scope=${{ steps.slug.outputs.value }}
          cache-to:   type=gha,scope=${{ steps.slug.outputs.value }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ steps.slug.outputs.value }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Merge per-platform digests into a single multi-arch manifest list
  # ────────────────────────────────────────────────────────────────────────────
  merge-manifest:
    name: Create & push multi-arch manifest
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (needed for short SHA)
        uses: actions/checkout@v4

      - name: Derive VERSION label (same logic as build job)
        id: version
        run: |
          V="${{ github.event.inputs.version }}"
          if [[ -z "${V}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              V="${GITHUB_REF_NAME#v}"
            else
              V="${GITHUB_REF_NAME}-$(git rev-parse --short HEAD)"
            fi
          fi
          echo "value=${V}" >> "$GITHUB_OUTPUT"

      - name: Download all digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # Exact version from git tag  (e.g. v4.1.0 → 4.1.0)
            type=semver,pattern={{version}}
            # Major.minor shorthand       (e.g. 4.1)
            type=semver,pattern={{major}}.{{minor}}
            # "latest" on the default branch only
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            # Branch + short SHA for non-tag builds
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.ref_type != 'tag' }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          IMAGE_LC="${IMAGE,,}"
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}')
          DIGESTS=$(printf "${IMAGE_LC}@sha256:%s " *)
          docker buildx imagetools create ${TAGS} ${DIGESTS}

      - name: Inspect final manifest
        run: |
          IMAGE_LC="${IMAGE,,}"
          docker buildx imagetools inspect "${IMAGE_LC}:${{ steps.version.outputs.value }}"

