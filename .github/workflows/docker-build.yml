name: Docker – Build & Push to GHCR

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  # Rebuild on any source change reaching main/master/develop
  push:
    branches: [main, master, develop]
    paths:
      - "src/**"
      - "frontend/**"
      - "package.json"
      - "yarn.lock"
      - "tsconfig.json"
      - "distribution/docker/**"
    tags:
      - "v*.*.*"

  # Manual run with optional version override
  workflow_dispatch:
    inputs:
      version:
        description: "Version label baked into the image (default: branch-sha)"
        required: false
        default: ""

# ──────────────────────────────────────────────────────────────────────────────
# Permissions
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build one image per platform, push by digest
  # ────────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive VERSION label
        id: version
        run: |
          V="${{ github.event.inputs.version }}"
          if [[ -z "${V}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              V="${GITHUB_REF_NAME#v}"          # strip leading "v"
            else
              V="${GITHUB_REF_NAME}-$(git rev-parse --short HEAD)"
            fi
          fi
          echo "value=${V}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # Exact version from git tag  (e.g. v4.1.0 → 4.1.0)
            type=semver,pattern={{version}}
            # Major.minor shorthand       (e.g. 4.1)
            type=semver,pattern={{major}}.{{minor}}
            # "latest" on the default branch only
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            # Branch + short SHA for non-tag builds
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ github.ref_type != 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distribution/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Inspect pushed image
        run: |
          IMAGE_LC="${IMAGE,,}"
          docker buildx imagetools inspect "${IMAGE_LC}:${{ steps.version.outputs.value }}"
